{% extends "base.html" %}
{% block title %}Gestión de Personal{% endblock %}
{% block content %}
<style>
    .panel-formulario { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: end; }
    .input-group { display: flex; flex-direction: column; }
    .input-group label { font-weight: bold; margin-bottom: 5px; color: #4a5568; font-size: 0.9rem; }
    .input-group input, .input-group select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; }
    .btn-guardar { background-color: #38a169; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 40px;}
    .tabla-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow-x: auto;}
    .tabla-personal { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    .tabla-personal th { background-color: #edf2f7; color: #4a5568; padding: 12px; text-align: left; border-bottom: 2px solid #cbd5e0; }
    .tabla-personal td { padding: 12px; border-bottom: 1px solid #e2e8f0; color: #2d3748; }
    .badge-admin { background-color: #fed7d7; color: #9b2c2c; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    .badge-operador { background-color: #e2e8f0; color: #2d3748; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
</style>

<div class="panel-formulario">
    <h3 style="margin-top: 0;">Nuevo Empleado</h3>
    <form action="/personal" method="POST" class="form-grid">
        <div class="input-group"><label>Usuario</label><input type="text" name="usuario" required></div>
        <div class="input-group"><label>Contraseña</label><input type="password" name="password" required></div>
        <div class="input-group">
            <label>Área</label>
            <select name="id_area" required>
                {% for area in areas %}<option value="{{ area.id_area }}">{{ area.nombre_area }}</option>{% endfor %}
            </select>
        </div>
        <div class="input-group">
            <label>Rol</label>
            <select name="rol" required>
                <option value="Operador">Operador</option>
                <option value="Administrador">Administrador</option>
            </select>
        </div>
        <button type="submit" class="btn-guardar">Registrar</button>
    </form>
</div>

<div class="tabla-container">
    <table class="tabla-personal">
        <thead>
            <tr><th>ID</th><th>Usuario</th><th>Área</th><th>Rol</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            {% for persona in personal %}
            <tr>
                <td>#{{ persona.id }}</td>
                <td><strong>{{ persona.usuario }}</strong></td>
                <td>{{ persona.area }}</td>
                <td><span class="{{ 'badge-admin' if persona.rol == 'Administrador' else 'badge-operador' }}">{{ persona.rol }}</span></td>
                <td>
                    <a href="{{ url_for('editar_usuario', id=persona.id) }}" style="background:#3182ce; color:white; padding:5px 10px; border-radius:4px; text-decoration:none;">Editar</a>
                    <a href="{{ url_for('eliminar_usuario', id=persona.id) }}" style="background:#e53e3e; color:white; padding:5px 10px; border-radius:4px; text-decoration:none;" onclick="return confirm('¿Eliminar?')">Borrar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="panel-formulario" style="background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto;">
    <h2>Editar Usuario: {{ persona.usuario }}</h2>
    <form action="{{ url_for('editar_usuario', id=persona.id_usuario) }}" method="POST">
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold;">Área</label>
            <select name="id_area" style="width:100%; padding:8px;">
                {% for area in areas %}
                <option value="{{ area.id_area }}" {% if persona.id_area == area.id_area %}selected{% endif %}>{{ area.nombre_area }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display:block; font-weight:bold;">Rol</label>
            <select name="rol" style="width:100%; padding:8px;">
                <option value="Operador" {% if rol_actual == 'Operador' %}selected{% endif %}>Operador</option>
                <option value="Administrador" {% if rol_actual == 'Administrador' %}selected{% endif %}>Administrador</option>
            </select>
        </div>
        <button type="submit" style="background:#3182ce; color:white; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;">Guardar Cambios</button>
        <a href="{{ url_for('personal') }}" style="margin-left:10px; color:#667eea;">Cancelar</a>
    </form>
</div>
{% endblock %}

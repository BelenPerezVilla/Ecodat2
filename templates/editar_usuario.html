<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ecodata - Editar Usuario</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; background-color: #f8f9fa;}
        .sidebar { width: 250px; background-color: #343a40; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; background-color: #23272b; margin: 0;}
        .sidebar a { color: white; padding: 15px; text-decoration: none; border-bottom: 1px solid #495057; }
        .main { flex: 1; padding: 20px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-radius: 8px;}
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; max-width: 500px; margin: 0 auto; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; width: 100%; margin-bottom: 10px;}
        .btn-save { background-color: #007bff; }
        .btn-cancel { background-color: #6c757d; text-align: center; display: block; text-decoration: none;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ECODATA</h2>
        <a href="/dashboard">Inicio</a>
        <a href="/usuarios" class="active">Privilegios (Usuarios)</a>
    </div>

    <div class="main">
        <div class="topbar">
            <h3>Editar Usuario: {{ user.usuario }}</h3>
            <div>
                <span>Bienvenido, <strong>{{ usuario_actual }}</strong></span>
            </div>
        </div>

        <div class="card">
            <form method="POST" action="/editar_usuario/{{ user.id_usuario }}">
                <label>Nombre de Usuario:</label>
                <input type="text" name="usuario" value="{{ user.usuario }}" required>
                
                <label>Nueva Contraseña (dejar en blanco para no cambiarla):</label>
                <input type="text" name="contrasena" placeholder="Escribe una nueva contraseña si deseas cambiarla">
                
                <label>Área Asignada:</label>
                <select name="id_area" required>
                    {% for area in areas %}
                    <option value="{{ area.id_area }}" {% if area.id_area == user.id_area %}selected{% endif %}>
                        {{ area.nombre_area }}
                    </option>
                    {% endfor %}
                </select>
                
                <button type="submit" class="btn btn-save">Guardar Cambios</button>
                <a href="/usuarios" class="btn btn-cancel">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>

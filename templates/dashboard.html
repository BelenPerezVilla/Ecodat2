<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ecodata - Panel Principal</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 250px; background-color: #343a40; color: white; display: flex; flex-direction: column; }
        .sidebar h2 { text-align: center; padding: 20px 0; background-color: #23272b; margin: 0;}
        .sidebar a { color: white; padding: 15px; text-decoration: none; border-bottom: 1px solid #495057; }
        .sidebar a:hover { background-color: #495057; }
        .main { flex: 1; padding: 20px; background-color: #f8f9fa; }
        .topbar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ECODATA</h2>
        <a href="#">Inicio</a>
        <a href="#">Bodegas</a>
        <a href="#">Productos</a>
        <a href="#">Procesos</a>
        <a href="#">Administración Contable</a>
        <a href="/usuarios">Privilegios (Usuarios)</a>
    </div>

    <div class="main">
        <div class="topbar">
            <h3>Panel de Control</h3>
            <div>
                <span>Bienvenido, <strong>{{ usuario }}</strong></span> | 
                <a href="/logout" style="color: red; text-decoration: none;">Cerrar Sesión</a>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
            <h2>Módulo de Inicio</h2>
            <p>El sistema Flask está conectado correctamente a PostgreSQL (pgAdmin).</p>
        </div>
    </div>
</body>
</html>
